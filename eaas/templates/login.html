{% extends "base.html" %}
{% block content %}
<div class="section-head"><div><h1>Authenticate</h1><p>Live scan — identity + emotion verification (Section 4.1.3)</p></div></div>

<div class="panel">
  <div class="scan-wrap">
    <div class="scan-ring"><div class="scan-frame"><video id="video" autoplay muted playsinline></video></div></div>
    <div class="scan-status" id="scan-status">Position your face in the frame and press "Scan &amp; Authenticate"</div>
  </div>
  <button class="btn btn-primary btn-block" id="scan-btn" type="button">Scan &amp; Authenticate</button>
</div>

<script src="{{ url_for('static', filename='js/capture.js') }}"></script>
<script>
const video = document.getElementById('video');
const statusEl = document.getElementById('scan-status');
(async () => { await initCamera(video); })();

document.getElementById('scan-btn').addEventListener('click', async () => {
  statusEl.innerText = 'Analysing identity and emotional state...';
  const frame = grabFrame(video);
  const resp = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ frame })
  });
  const data = await resp.json();
  if (data.ok) {
    window.location.href = '/result/' + data.log_id;
  } else {
    statusEl.innerText = 'Error: ' + data.error;
  }
});
</script>
{% endblock %}
