services:
  - type: web
    name: eaas-prototype
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m eaas.db
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT eaas.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FLASK_ENV
        value: production
